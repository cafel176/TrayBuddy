<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>序列帧对齐工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            background: linear-gradient(90deg, #00d4ff, #7b2fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .control-panel h3 {
            margin-bottom: 15px;
            color: #00d4ff;
            font-size: 16px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }

        .input-group input[type="file"] {
            display: none;
        }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .drop-zone:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .drop-zone.drag-over {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.2);
            transform: scale(1.02);
        }

        .drop-zone-icon {
            font-size: 32px;
            margin-bottom: 8px;
            opacity: 0.6;
        }

        .drop-zone-text {
            font-size: 13px;
            color: #888;
        }

        .drop-zone-text span {
            color: #00d4ff;
            text-decoration: underline;
        }

        .file-name {
            font-size: 13px;
            color: #00d4ff;
            margin-top: 8px;
            word-break: break-all;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider-group input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #00d4ff, #7b2fff);
            border-radius: 50%;
            cursor: pointer;
        }

        .slider-value {
            min-width: 50px;
            text-align: right;
            font-size: 14px;
            color: #00d4ff;
        }

        .preview-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .preview-header h3 {
            color: #00d4ff;
            font-size: 16px;
        }

        .info-panel {
            display: flex;
            gap: 20px;
            font-size: 14px;
            flex-wrap: wrap;
            align-items: center;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-label {
            color: #888;
        }

        .info-input {
            width: 60px;
            padding: 4px 8px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 4px;
            color: #00d4ff;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            text-align: center;
        }

        .info-input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.2);
        }

        .info-input::-webkit-inner-spin-button,
        .info-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .info-value {
            color: #00d4ff;
            font-family: 'Monaco', 'Consolas', monospace;
            background: rgba(0, 212, 255, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
        }

        .preview-area {
            position: relative;
            width: 100%;
            height: 600px;
            background: repeating-conic-gradient(#333 0% 25%, #444 0% 50%) 50% / 20px 20px;
            border-radius: 8px;
            overflow: hidden;
            cursor: crosshair;
        }

        .preview-viewport {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-origin: center center;
            transition: none;
        }

        .preview-area .center-line-h {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 0, 0, 0.3);
            pointer-events: none;
            z-index: 100;
        }

        .preview-area .center-line-v {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(255, 0, 0, 0.3);
            pointer-events: none;
            z-index: 100;
        }

        .image-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: none;
            max-height: none;
            pointer-events: none;
        }

        #image1 {
            z-index: 1;
        }

        #image2 {
            z-index: 2;
            cursor: move;
            pointer-events: auto;
        }

        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
            font-size: 16px;
            z-index: 0;
        }

        .placeholder svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .reset-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .preview-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .zoom-btn {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            background: rgba(0, 212, 255, 0.3);
            border-color: #00d4ff;
        }

        .tips {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            font-size: 13px;
            color: #888;
        }

        .tips strong {
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>序列帧对齐工具</h1>
        
        <div class="controls">
            <div class="control-panel">
                <h3>图片 1（固定基准）</h3>
                <div class="input-group">
                    <label>选择图片</label>
                    <div class="drop-zone" id="dropZone1">
                        <div class="drop-zone-icon">📁</div>
                        <div class="drop-zone-text">拖拽图片到此处 或 <span>点击选择</span></div>
                    </div>
                    <input type="file" id="file1" accept="image/*">
                    <div class="file-name" id="fileName1"></div>
                </div>
                <div class="input-group">
                    <label>透明度</label>
                    <div class="slider-group">
                        <input type="range" id="opacity1" min="0" max="100" value="100">
                        <span class="slider-value" id="opacity1Value">100%</span>
                    </div>
                </div>
            </div>
            
            <div class="control-panel">
                <h3>图片 2（可调整）</h3>
                <div class="input-group">
                    <label>选择图片</label>
                    <div class="drop-zone" id="dropZone2">
                        <div class="drop-zone-icon">📁</div>
                        <div class="drop-zone-text">拖拽图片到此处 或 <span>点击选择</span></div>
                    </div>
                    <input type="file" id="file2" accept="image/*">
                    <div class="file-name" id="fileName2"></div>
                </div>
                <div class="input-group">
                    <label>透明度</label>
                    <div class="slider-group">
                        <input type="range" id="opacity2" min="0" max="100" value="50">
                        <span class="slider-value" id="opacity2Value">50%</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>缩放</label>
                    <div class="slider-group">
                        <input type="range" id="scale2" min="10" max="300" value="100">
                        <span class="slider-value" id="scale2Value">100%</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="preview-container">
            <div class="preview-header">
                <h3>预览区域</h3>
                <div class="info-panel">
                    <div class="info-item">
                        <span class="info-label">X:</span>
                        <input type="number" class="info-input" id="offsetXInput" value="0">
                    </div>
                    <div class="info-item">
                        <span class="info-label">Y:</span>
                        <input type="number" class="info-input" id="offsetYInput" value="0">
                    </div>
                    <div class="info-item">
                        <span class="info-label">缩放:</span>
                        <input type="number" class="info-input" id="scaleInput" value="100" min="10" max="300">
                        <span style="color:#888">%</span>
                    </div>
                </div>
                <button class="reset-btn" id="resetBtn">重置位置</button>
                <button class="reset-btn" id="resetViewBtn">重置视图</button>
            </div>
            
            <div class="preview-area" id="previewArea">
                <div class="preview-viewport" id="previewViewport">
                    <div class="center-line-h"></div>
                    <div class="center-line-v"></div>
                    <div class="placeholder" id="placeholder">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                        </svg>
                        <div>请上传图片开始对齐</div>
                    </div>
                    <img id="image1" class="image-layer" style="display: none;">
                    <img id="image2" class="image-layer" style="display: none;">
                </div>
            </div>
            
            <div class="preview-toolbar">
                <span class="info-label">预览缩放:</span>
                <button class="zoom-btn" id="zoomOut">−</button>
                <span class="info-value" id="viewZoomInfo">100%</span>
                <button class="zoom-btn" id="zoomIn">+</button>
                <button class="zoom-btn" id="zoomFit">适应</button>
            </div>
            
            <div class="tips">
                <strong>操作提示：</strong>
                拖拽图片到对应区域上传 | 拖拽图片2调整位置 | 方向键微调(Shift加速) | Ctrl+滚轮缩放预览 | 滚轮缩放图片2
            </div>
        </div>
    </div>

    <script>
        // 元素引用
        const file1Input = document.getElementById('file1');
        const file2Input = document.getElementById('file2');
        const dropZone1 = document.getElementById('dropZone1');
        const dropZone2 = document.getElementById('dropZone2');
        const fileName1 = document.getElementById('fileName1');
        const fileName2 = document.getElementById('fileName2');
        const opacity1Slider = document.getElementById('opacity1');
        const opacity2Slider = document.getElementById('opacity2');
        const scale2Slider = document.getElementById('scale2');
        const opacity1Value = document.getElementById('opacity1Value');
        const opacity2Value = document.getElementById('opacity2Value');
        const scale2Value = document.getElementById('scale2Value');
        const image1 = document.getElementById('image1');
        const image2 = document.getElementById('image2');
        const previewArea = document.getElementById('previewArea');
        const previewViewport = document.getElementById('previewViewport');
        const placeholder = document.getElementById('placeholder');
        const offsetXInput = document.getElementById('offsetXInput');
        const offsetYInput = document.getElementById('offsetYInput');
        const scaleInput = document.getElementById('scaleInput');
        const viewZoomInfo = document.getElementById('viewZoomInfo');
        const resetBtn = document.getElementById('resetBtn');
        const resetViewBtn = document.getElementById('resetViewBtn');
        const zoomInBtn = document.getElementById('zoomIn');
        const zoomOutBtn = document.getElementById('zoomOut');
        const zoomFitBtn = document.getElementById('zoomFit');

        // 状态
        let offsetX = 0;
        let offsetY = 0;
        let scale = 1;
        let isDragging = false;
        let startX, startY;
        let image2Loaded = false;

        // 预览区域整体缩放和平移状态
        let viewZoom = 1;
        let viewPanX = 0;
        let viewPanY = 0;
        let isPanning = false;
        let panStartX, panStartY;

        // 通用的加载图片函数
        function loadImage1(file) {
            if (file && file.type.startsWith('image/')) {
                fileName1.textContent = file.name;
                const reader = new FileReader();
                reader.onload = (e) => {
                    image1.src = e.target.result;
                    image1.style.display = 'block';
                    updatePlaceholder();
                };
                reader.readAsDataURL(file);
            }
        }

        function loadImage2(file) {
            if (file && file.type.startsWith('image/')) {
                fileName2.textContent = file.name;
                const reader = new FileReader();
                reader.onload = (e) => {
                    image2.src = e.target.result;
                    image2.style.display = 'block';
                    image2Loaded = true;
                    resetPosition();
                    updatePlaceholder();
                };
                reader.readAsDataURL(file);
            }
        }

        // 拖拽区域设置
        function setupDropZone(dropZone, fileInput, loadFn) {
            // 点击触发文件选择
            dropZone.addEventListener('click', () => fileInput.click());

            // 拖拽事件
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                loadFn(file);
            });

            // 文件选择事件
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                loadFn(file);
            });
        }

        setupDropZone(dropZone1, file1Input, loadImage1);
        setupDropZone(dropZone2, file2Input, loadImage2);

        // 阻止页面默认拖拽行为
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => e.preventDefault());

        // 透明度控制
        opacity1Slider.addEventListener('input', (e) => {
            const value = e.target.value;
            opacity1Value.textContent = value + '%';
            image1.style.opacity = value / 100;
        });

        opacity2Slider.addEventListener('input', (e) => {
            const value = e.target.value;
            opacity2Value.textContent = value + '%';
            image2.style.opacity = value / 100;
        });

        // 缩放控制
        scale2Slider.addEventListener('input', (e) => {
            scale = e.target.value / 100;
            scale2Value.textContent = e.target.value + '%';
            updateImage2Transform();
            updateInfo();
        });

        // 输入框控制
        offsetXInput.addEventListener('change', (e) => {
            offsetX = parseInt(e.target.value) || 0;
            updateImage2Transform();
        });

        offsetYInput.addEventListener('change', (e) => {
            offsetY = parseInt(e.target.value) || 0;
            updateImage2Transform();
        });

        scaleInput.addEventListener('change', (e) => {
            let val = parseInt(e.target.value) || 100;
            val = Math.max(10, Math.min(300, val));
            scale = val / 100;
            scaleInput.value = val;
            scale2Slider.value = val;
            scale2Value.textContent = val + '%';
            updateImage2Transform();
        });

        // 拖拽功能
        image2.addEventListener('mousedown', (e) => {
            if (!image2Loaded || e.button !== 0) return;
            isDragging = true;
            startX = e.clientX - offsetX;
            startY = e.clientY - offsetY;
            image2.style.cursor = 'grabbing';
            e.preventDefault();
        });

        document.addEventListener('mouseup', (e) => {
            if (e.button === 1) {
                isPanning = false;
                previewArea.style.cursor = 'crosshair';
            }
            isDragging = false;
            image2.style.cursor = 'move';
        });

        // 键盘方向键微调
        document.addEventListener('keydown', (e) => {
            if (!image2Loaded) return;
            
            // Shift加速：10像素，普通：1像素
            const step = e.shiftKey ? 10 : 1;
            
            switch (e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    offsetY -= step;
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    offsetY += step;
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    offsetX -= step;
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    offsetX += step;
                    break;
                default:
                    return;
            }
            
            updateImage2Transform();
            updateInfo();
        });

        // 滚轮缩放
        previewArea.addEventListener('wheel', (e) => {
            e.preventDefault();
            
            // Ctrl+滚轮：缩放整体预览
            if (e.ctrlKey) {
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                viewZoom = Math.max(0.25, Math.min(5, viewZoom + delta));
                updateViewportTransform();
                return;
            }
            
            // 普通滚轮：缩放图片2
            if (!image2Loaded) return;
            
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            scale = Math.max(0.1, Math.min(3, scale + delta));
            
            const sliderValue = Math.round(scale * 100);
            scale2Slider.value = sliderValue;
            scale2Value.textContent = sliderValue + '%';
            
            updateImage2Transform();
            updateInfo();
        });

        // 中键拖拽平移预览区域
        previewArea.addEventListener('mousedown', (e) => {
            if (e.button === 1) { // 中键
                e.preventDefault();
                isPanning = true;
                panStartX = e.clientX - viewPanX;
                panStartY = e.clientY - viewPanY;
                previewArea.style.cursor = 'grabbing';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isPanning) {
                viewPanX = e.clientX - panStartX;
                viewPanY = e.clientY - panStartY;
                updateViewportTransform();
            }
            if (!isDragging) return;
            offsetX = e.clientX - startX;
            offsetY = e.clientY - startY;
            updateImage2Transform();
            updateInfo();
        });

        document.addEventListener('mouseup', (e) => {
            if (e.button === 1) {
                isPanning = false;
                previewArea.style.cursor = 'crosshair';
            }
            isDragging = false;
            image2.style.cursor = 'move';
        });

        // 更新视口变换
        function updateViewportTransform() {
            previewViewport.style.transform = `translate(${viewPanX}px, ${viewPanY}px) scale(${viewZoom})`;
            viewZoomInfo.textContent = Math.round(viewZoom * 100) + '%';
        }

        // 缩放按钮
        zoomInBtn.addEventListener('click', () => {
            viewZoom = Math.min(5, viewZoom + 0.25);
            updateViewportTransform();
        });

        zoomOutBtn.addEventListener('click', () => {
            viewZoom = Math.max(0.25, viewZoom - 0.25);
            updateViewportTransform();
        });

        zoomFitBtn.addEventListener('click', () => {
            viewZoom = 1;
            viewPanX = 0;
            viewPanY = 0;
            updateViewportTransform();
        });

        resetViewBtn.addEventListener('click', () => {
            viewZoom = 1;
            viewPanX = 0;
            viewPanY = 0;
            updateViewportTransform();
        });

        // 更新图片2变换
        function updateImage2Transform() {
            image2.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px)) scale(${scale})`;
        }

        // 更新信息显示
        function updateInfo() {
            offsetXInput.value = Math.round(offsetX);
            offsetYInput.value = Math.round(offsetY);
            scaleInput.value = Math.round(scale * 100);
        }

        // 重置位置
        function resetPosition() {
            offsetX = 0;
            offsetY = 0;
            scale = 1;
            scale2Slider.value = 100;
            scale2Value.textContent = '100%';
            updateImage2Transform();
            updateInfo();
        }

        resetBtn.addEventListener('click', resetPosition);

        // 更新占位符显示
        function updatePlaceholder() {
            if (image1.style.display === 'block' || image2.style.display === 'block') {
                placeholder.style.display = 'none';
            } else {
                placeholder.style.display = 'block';
            }
        }

        // 初始化透明度
        image2.style.opacity = 0.5;
    </script>
</body>
</html>
