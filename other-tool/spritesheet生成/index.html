<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Sprite Sheet 生成器</title>
    <link rel="stylesheet" href="style.css">
    <script src="../i18n-helper.js"></script>
</head>
<body>
    <div class="container">
        <h1 data-i18n="header_title">🎮 Sprite Sheet 生成器</h1>
        
        <div class="main-content">
            <div class="panel">
                <h2 data-i18n="import_title">📁 导入帧图片</h2>
                
                <div class="drop-zone" id="dropZone">
                    <div class="drop-zone-icon">📂</div>
                    <p data-i18n="drop_zone_text">拖拽PNG图片到这里<br>或点击选择文件</p>
                </div>
                <input type="file" id="fileInput" multiple accept="image/png">
                
                <div class="frame-list" id="frameList"></div>
                
                <div class="size-info" id="sizeInfo">
                    <div class="title" data-i18n="base_size_title">📐 基准尺寸 (以第一张图为准)</div>
                    <div class="value" id="baseSize">-</div>
                </div>
                
                <div class="size-warning" id="sizeWarning" data-i18n="size_warning">
                    ⚠️ 部分图片尺寸不一致，已标红并将在生成时被忽略
                </div>
                
                <button class="btn btn-secondary" id="clearBtn" style="display: none;" data-i18n="clear_btn">清空所有帧</button>
                
                <h2 style="margin-top: 30px;" data-i18n="settings_title">⚙️ 设置</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label data-i18n="columns_label">列数</label>
                        <input type="number" id="columns" value="4" min="1" max="100">
                    </div>
                    <div class="form-group">
                        <label data-i18n="rows_label">行数 (0=自动)</label>
                        <input type="number" id="rows" value="0" min="0" max="100">
                    </div>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="reverseOrder">
                    <label for="reverseOrder" data-i18n="reverse_order_label">按名称倒序排列</label>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="customSize">
                    <label for="customSize" data-i18n="custom_size_label">自定义帧尺寸</label>
                </div>

                <div class="form-row" id="sizeInputs" style="display: none;">
                    <div class="form-group">
                        <label data-i18n="frame_width_label">帧宽度 (px)</label>
                        <input type="number" id="frameWidth" value="64" min="1">
                    </div>
                    <div class="form-group">
                        <label data-i18n="frame_height_label">帧高度 (px)</label>
                        <input type="number" id="frameHeight" value="64" min="1">
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="compressWebp" checked>
                    <label for="compressWebp" data-i18n="compress_webp_label">导出为 WebP (压缩体积)</label>
                </div>

                <div class="form-group" id="webpQualityGroup">
                    <label><span data-i18n="webp_quality_label" data-i18n-n="85">WebP 质量: 85%</span></label>
                    <input type="range" id="webpQuality" min="10" max="100" value="85" style="width: 100%; accent-color: #00d9ff;">
                </div>


                
                <button class="btn btn-primary" id="generateBtn" disabled data-i18n="generate_btn">生成 Sprite Sheet</button>
                <button class="btn btn-secondary" id="downloadBtn" style="display: none;" data-i18n="download_png_btn">💾 下载 PNG</button>
            </div>
            
            <div class="panel preview-area">
                <h2 data-i18n="preview_title">👁️ 预览</h2>
                <div class="preview-container" id="previewContainer">
                    <div class="preview-placeholder">
                        <div class="icon">🖼️</div>
                        <p data-i18n="preview_placeholder">导入图片后生成预览</p>
                    </div>
                </div>
                <div class="stats" id="stats" style="display: none;">
                    <div class="stat-item">
                        <div class="value" id="statFrames">0</div>
                        <div class="label" data-i18n="stat_frames_label">帧数</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="statSize">0x0</div>
                        <div class="label" data-i18n="stat_size_label">输出尺寸</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="statLayout">0x0</div>
                        <div class="label" data-i18n="stat_layout_label">布局 (列x行)</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
