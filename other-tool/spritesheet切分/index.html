<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Sheet 切分器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #feca57;
        }

        .drop-zone {
            border: 2px dashed rgba(254, 202, 87, 0.5);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        .drop-zone-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .drop-zone p {
            color: #aaa;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #ccc;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: #feca57;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            color: #1a1a2e;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(254, 202, 87, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .image-info {
            background: rgba(254, 202, 87, 0.1);
            border: 1px solid rgba(254, 202, 87, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            display: none;
        }

        .image-info.show {
            display: block;
        }

        .image-info .title {
            font-size: 0.85rem;
            color: #feca57;
            margin-bottom: 5px;
        }

        .image-info .value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
        }

        .calc-info {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            display: none;
        }

        .calc-info.show {
            display: block;
        }

        .calc-info .title {
            font-size: 0.85rem;
            color: #00d9ff;
            margin-bottom: 5px;
        }

        .calc-info .value {
            font-size: 1rem;
            color: #fff;
        }

        .preview-area {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .preview-container {
            flex: 1;
            background: repeating-conic-gradient(#2a2a3a 0% 25%, #1a1a2e 0% 50%) 50% / 20px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            min-height: 400px;
            position: relative;
        }

        .preview-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .preview-container.with-grid {
            position: relative;
        }

        .preview-wrapper {
            position: relative;
            display: inline-block;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .preview-placeholder {
            color: #666;
            text-align: center;
        }

        .preview-placeholder .icon {
            font-size: 64px;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-item .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #feca57;
        }

        .stat-item .label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .result-grid::-webkit-scrollbar {
            width: 6px;
        }

        .result-grid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .result-grid::-webkit-scrollbar-thumb {
            background: #feca57;
            border-radius: 3px;
        }

        .result-item {
            background: repeating-conic-gradient(#333 0% 25%, #444 0% 50%) 50% / 8px 8px;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .result-item img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .result-item .frame-number {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.7);
            color: #feca57;
            font-size: 0.7rem;
            padding: 1px 4px;
            border-radius: 3px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✂️ Sprite Sheet 切分器</h1>
        
        <div class="main-content">
            <div class="panel">
                <h2>📁 导入 Sprite Sheet</h2>
                
                <div class="drop-zone" id="dropZone">
                    <div class="drop-zone-icon">📂</div>
                    <p>拖拽PNG图片到这里<br>或点击选择文件</p>
                </div>
                <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">
                
                <div class="image-info" id="imageInfo">
                    <div class="title">📐 图片尺寸</div>
                    <div class="value" id="imageSize">-</div>
                </div>
                
                <button class="btn btn-secondary" id="clearBtn" style="display: none;">清除图片</button>
                
                <h2 style="margin-top: 30px;">⚙️ 切分设置</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>列数</label>
                        <input type="number" id="columns" value="4" min="1" max="100">
                    </div>
                    <div class="form-group">
                        <label>行数</label>
                        <input type="number" id="rows" value="4" min="1" max="100">
                    </div>
                </div>
                
                <div class="calc-info" id="calcInfo">
                    <div class="title">📊 计算结果</div>
                    <div class="value" id="calcValue">-</div>
                </div>
                
                <h2 style="margin-top: 20px;">💾 导出设置</h2>
                
                <div class="form-group">
                    <label>文件名前缀</label>
                    <input type="text" id="filePrefix" value="frame_" placeholder="frame_">
                </div>
                
                <button class="btn btn-primary" id="splitBtn" disabled>切分图片</button>
                <button class="btn btn-secondary" id="downloadAllBtn" style="display: none;">📦 打包下载 (ZIP)</button>
            </div>
            
            <div class="panel preview-area">
                <h2>👁️ 预览</h2>
                <div class="preview-container" id="previewContainer">
                    <div class="preview-placeholder">
                        <div class="icon">🖼️</div>
                        <p>导入Sprite Sheet后预览</p>
                    </div>
                </div>
                <div class="stats" id="stats" style="display: none;">
                    <div class="stat-item">
                        <div class="value" id="statFrames">0</div>
                        <div class="label">总帧数</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="statFrameSize">0x0</div>
                        <div class="label">帧尺寸</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="statLayout">0x0</div>
                        <div class="label">布局 (列x行)</div>
                    </div>
                </div>
                <div class="result-grid" id="resultGrid" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const clearBtn = document.getElementById('clearBtn');
        const splitBtn = document.getElementById('splitBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const previewContainer = document.getElementById('previewContainer');
        const columnsInput = document.getElementById('columns');
        const rowsInput = document.getElementById('rows');
        const filePrefixInput = document.getElementById('filePrefix');
        const stats = document.getElementById('stats');
        const imageInfo = document.getElementById('imageInfo');
        const imageSize = document.getElementById('imageSize');
        const calcInfo = document.getElementById('calcInfo');
        const calcValue = document.getElementById('calcValue');
        const resultGrid = document.getElementById('resultGrid');

        let sourceImage = null;
        let splitFrames = [];

        // 拖拽事件
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(f => 
                f.type === 'image/png' || f.type === 'image/jpeg' || f.type === 'image/webp'
            );
            if (files.length > 0) {
                loadImage(files[0]);
            }
        });

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                loadImage(files[0]);
            }
            fileInput.value = '';
        });

        // 加载图片
        function loadImage(file) {
            const img = new Image();
            const url = URL.createObjectURL(file);
            
            img.onload = () => {
                if (sourceImage) {
                    URL.revokeObjectURL(sourceImage.url);
                }
                sourceImage = {
                    img: img,
                    url: url,
                    width: img.width,
                    height: img.height,
                    name: file.name
                };
                
                updateImageInfo();
                updatePreview();
                updateUI();
            };
            img.src = url;
        }

        // 更新图片信息
        function updateImageInfo() {
            if (sourceImage) {
                imageInfo.classList.add('show');
                imageSize.textContent = `${sourceImage.width} × ${sourceImage.height} px`;
                updateCalcInfo();
            } else {
                imageInfo.classList.remove('show');
                imageSize.textContent = '-';
            }
        }

        // 更新计算信息
        function updateCalcInfo() {
            if (!sourceImage) {
                calcInfo.classList.remove('show');
                return;
            }
            
            const cols = parseInt(columnsInput.value) || 1;
            const rows = parseInt(rowsInput.value) || 1;
            const frameWidth = Math.floor(sourceImage.width / cols);
            const frameHeight = Math.floor(sourceImage.height / rows);
            const totalFrames = cols * rows;
            
            calcInfo.classList.add('show');
            calcValue.textContent = `每帧 ${frameWidth} × ${frameHeight} px，共 ${totalFrames} 帧`;
        }

        // 更新预览
        function updatePreview() {
            if (!sourceImage) return;
            
            const cols = parseInt(columnsInput.value) || 1;
            const rows = parseInt(rowsInput.value) || 1;
            
            previewContainer.innerHTML = '';
            previewContainer.classList.add('with-grid');
            
            const wrapper = document.createElement('div');
            wrapper.className = 'preview-wrapper';
            
            const previewImg = document.createElement('img');
            previewImg.src = sourceImage.url;
            previewImg.id = 'previewImg';
            wrapper.appendChild(previewImg);
            
            // 等图片加载完成后绘制网格
            previewImg.onload = () => {
                const displayWidth = previewImg.offsetWidth;
                const displayHeight = previewImg.offsetHeight;
                
                // 创建网格覆盖层
                const gridCanvas = document.createElement('canvas');
                gridCanvas.className = 'grid-overlay';
                gridCanvas.width = displayWidth;
                gridCanvas.height = displayHeight;
                gridCanvas.style.width = displayWidth + 'px';
                gridCanvas.style.height = displayHeight + 'px';
                
                const ctx = gridCanvas.getContext('2d');
                ctx.strokeStyle = 'rgba(255, 107, 107, 0.8)';
                ctx.lineWidth = 1;
                
                const cellWidth = displayWidth / cols;
                const cellHeight = displayHeight / rows;
                
                // 绘制垂直线
                for (let i = 1; i < cols; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * cellWidth, 0);
                    ctx.lineTo(i * cellWidth, displayHeight);
                    ctx.stroke();
                }
                
                // 绘制水平线
                for (let i = 1; i < rows; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, i * cellHeight);
                    ctx.lineTo(displayWidth, i * cellHeight);
                    ctx.stroke();
                }
                
                wrapper.appendChild(gridCanvas);
            };
            
            previewContainer.appendChild(wrapper);
        }

        // 清除图片
        clearBtn.addEventListener('click', () => {
            if (sourceImage) {
                URL.revokeObjectURL(sourceImage.url);
                sourceImage = null;
            }
            splitFrames = [];
            imageInfo.classList.remove('show');
            calcInfo.classList.remove('show');
            previewContainer.innerHTML = `
                <div class="preview-placeholder">
                    <div class="icon">🖼️</div>
                    <p>导入Sprite Sheet后预览</p>
                </div>
            `;
            previewContainer.classList.remove('with-grid');
            stats.style.display = 'none';
            resultGrid.style.display = 'none';
            downloadAllBtn.style.display = 'none';
            updateUI();
        });

        // 更新UI状态
        function updateUI() {
            splitBtn.disabled = !sourceImage;
            clearBtn.style.display = sourceImage ? 'block' : 'none';
        }

        // 切分图片
        splitBtn.addEventListener('click', splitImage);

        function splitImage() {
            if (!sourceImage) return;
            
            const cols = parseInt(columnsInput.value) || 1;
            const rows = parseInt(rowsInput.value) || 1;
            const frameWidth = Math.floor(sourceImage.width / cols);
            const frameHeight = Math.floor(sourceImage.height / rows);
            
            splitFrames = [];
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const canvas = document.createElement('canvas');
                    canvas.width = frameWidth;
                    canvas.height = frameHeight;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.drawImage(
                        sourceImage.img,
                        col * frameWidth,
                        row * frameHeight,
                        frameWidth,
                        frameHeight,
                        0,
                        0,
                        frameWidth,
                        frameHeight
                    );
                    
                    splitFrames.push({
                        canvas: canvas,
                        index: row * cols + col
                    });
                }
            }
            
            // 更新统计
            stats.style.display = 'grid';
            document.getElementById('statFrames').textContent = splitFrames.length;
            document.getElementById('statFrameSize').textContent = `${frameWidth}x${frameHeight}`;
            document.getElementById('statLayout').textContent = `${cols}x${rows}`;
            
            // 显示结果
            displayResults();
            downloadAllBtn.style.display = 'block';
        }

        // 显示切分结果
        function displayResults() {
            resultGrid.style.display = 'grid';
            resultGrid.innerHTML = '';
            
            splitFrames.forEach((frame, index) => {
                const item = document.createElement('div');
                item.className = 'result-item';
                
                const img = document.createElement('img');
                img.src = frame.canvas.toDataURL('image/png');
                item.appendChild(img);
                
                const number = document.createElement('span');
                number.className = 'frame-number';
                number.textContent = index;
                item.appendChild(number);
                
                // 点击单独下载
                item.style.cursor = 'pointer';
                item.title = '点击下载此帧';
                item.addEventListener('click', () => {
                    downloadSingleFrame(frame, index);
                });
                
                resultGrid.appendChild(item);
            });
        }

        // 下载单个帧
        function downloadSingleFrame(frame, index) {
            const prefix = filePrefixInput.value || 'frame_';
            const paddedIndex = String(index).padStart(4, '0');
            const filename = `${prefix}${paddedIndex}.png`;
            
            const link = document.createElement('a');
            link.download = filename;
            link.href = frame.canvas.toDataURL('image/png');
            link.click();
        }

        // 打包下载所有帧
        downloadAllBtn.addEventListener('click', async () => {
            if (splitFrames.length === 0) return;
            
            downloadAllBtn.disabled = true;
            downloadAllBtn.textContent = '⏳ 打包中...';
            
            try {
                const zip = new JSZip();
                const prefix = filePrefixInput.value || 'frame_';
                
                for (let i = 0; i < splitFrames.length; i++) {
                    const frame = splitFrames[i];
                    const paddedIndex = String(i).padStart(4, '0');
                    const filename = `${prefix}${paddedIndex}.png`;
                    
                    // 将canvas转换为blob
                    const blob = await new Promise(resolve => {
                        frame.canvas.toBlob(resolve, 'image/png');
                    });
                    
                    zip.file(filename, blob);
                }
                
                // 生成zip文件
                const content = await zip.generateAsync({ type: 'blob' });
                
                // 下载
                const link = document.createElement('a');
                link.download = 'sprite_frames.zip';
                link.href = URL.createObjectURL(content);
                link.click();
                URL.revokeObjectURL(link.href);
            } catch (error) {
                console.error('打包失败:', error);
                alert('打包失败，请重试');
            } finally {
                downloadAllBtn.disabled = false;
                downloadAllBtn.textContent = '📦 打包下载 (ZIP)';
            }
        });

        // 输入变化时更新预览
        [columnsInput, rowsInput].forEach(input => {
            input.addEventListener('input', () => {
                updateCalcInfo();
                if (sourceImage) {
                    updatePreview();
                }
            });
        });
    </script>
</body>
</html>
