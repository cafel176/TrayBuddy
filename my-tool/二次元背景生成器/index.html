<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">二次元背景生成器</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 左侧控制面板 -->
        <div class="control-panel">
            <h1 data-i18n="main_title">🎨 二次元背景生成器</h1>
            
            <!-- 主题色 -->
            <div class="control-section">
                <h3 data-i18n="section_theme">🎯 主题色</h3>
                <div class="control-row">
                    <label data-i18n="theme_color">主题色:</label>
                    <input type="color" id="themeColor" value="#8c5cff">
                    <button type="button" id="applyTheme" class="btn-secondary" data-i18n="theme_apply">一键套用</button>
                </div>
            </div>

            <!-- 画布尺寸 -->
            <div class="control-section">
                <h3 data-i18n="section_canvas">📐 画布尺寸</h3>
                <div class="control-row">
                    <label data-i18n="canvas_width">宽度:</label>
                    <input type="number" id="canvasWidth" value="1920" min="100" max="4096">
                </div>

                <div class="control-row">
                    <label data-i18n="canvas_height">高度:</label>
                    <input type="number" id="canvasHeight" value="1080" min="100" max="4096">
                </div>
                <div class="preset-buttons">
                    <button onclick="setPreset(1920, 1080)" data-i18n="preset_1080p">1080p</button>
                    <button onclick="setPreset(1280, 720)" data-i18n="preset_720p">720p</button>
                    <button onclick="setPreset(800, 600)" data-i18n="preset_4_3">4:3</button>
                    <button onclick="setPreset(1080, 1920)" data-i18n="preset_mobile">手机竖屏</button>
                </div>

            </div>

            <!-- 背景颜色 -->
            <div class="control-section">
                <h3 data-i18n="section_bg_color">🎨 背景颜色</h3>
                <div class="control-row">
                    <label data-i18n="bg_primary">主色调:</label>
                    <input type="color" id="bgColor1" value="#1f122e">
                </div>
                <div class="control-row">
                    <label data-i18n="bg_secondary">边框外色:</label>
                    <input type="color" id="bgColor2" value="#0a0612">
                </div>
            </div>

            <!-- 菱形图案 -->
            <div class="control-section">
                <h3 data-i18n="section_diamond">💎 菱形图案</h3>
                <div class="control-row">
                    <label>
                        <input type="checkbox" id="enableDiamond" checked>
                        <span data-i18n="enable_diamond">启用菱形图案</span>
                    </label>
                </div>
                <div class="control-row">
                    <label data-i18n="diamond_light">亮色:</label>
                    <input type="color" id="diamondLight" value="#efe6ff">
                </div>
                <div class="control-row">
                    <label data-i18n="diamond_dark">暗色:</label>
                    <input type="color" id="diamondDark" value="#3b1e63">
                </div>
                <div class="control-row">
                    <label data-i18n="pattern_style">循环样式:</label>
                    <select id="patternStyle">
                        <option value="diamond" data-i18n="pattern_diamond">菱形格</option>
                        <option value="grid" data-i18n="pattern_grid">方格棋盘</option>
                        <option value="dots" data-i18n="pattern_dots">圆点排列</option>
                        <option value="stripes" data-i18n="pattern_stripes">斜纹条纹</option>
                        <option value="cross" data-i18n="pattern_cross">交错网格</option>
                        <option value="honeycomb" data-i18n="pattern_honeycomb">蜂巢六边形</option>
                        <option value="stars" data-i18n="pattern_stars">星光闪烁</option>
                        <option value="music" data-i18n="pattern_music">音符线谱</option>
                        <option value="floral" data-i18n="pattern_floral">花纹蔓影</option>
                    </select>
                </div>
                <div class="control-row">
                    <label data-i18n="diamond_size">格子大小:</label>
                    <input type="range" id="diamondSize" min="30" max="140" value="90">
                    <span id="diamondSizeValue">90</span>
                </div>
                <div class="control-row">
                    <label data-i18n="diamond_opacity">透明度:</label>
                    <input type="range" id="diamondOpacity" min="0" max="100" value="100">
                    <span id="diamondOpacityValue">100%</span>
                </div>
            </div>

            <!-- 边框设置 -->
            <div class="control-section">
                <h3 data-i18n="section_border">🖼️ 装饰边框</h3>
                <div class="control-row">
                    <label>
                        <input type="checkbox" id="enableBorder" checked>
                        <span data-i18n="enable_border">启用边框</span>
                    </label>
                </div>
                <div class="control-row">
                    <label data-i18n="border_color">边框颜色:</label>
                    <input type="color" id="borderColor" value="#f2d38f">
                </div>
                <div class="control-row">
                    <label data-i18n="border_width">边框粗细:</label>
                    <input type="range" id="borderWidth" min="1" max="10" value="3">
                    <span id="borderWidthValue">3</span>
                </div>
                <div class="control-row">
                    <label data-i18n="border_padding">边框间距:</label>
                    <input type="range" id="borderPadding" min="20" max="100" value="40">
                    <span id="borderPaddingValue">40</span>
                </div>
                <div class="control-row">
                    <label data-i18n="border_layers">边框层数:</label>
                    <input type="range" id="borderLayers" min="1" max="4" value="2">
                    <span id="borderLayersValue">2</span>
                </div>
                <div class="control-row">
                    <label data-i18n="border_style">边框样式:</label>
                    <select id="borderStyle">
                        <optgroup label="" data-i18n-label="optgroup_border_basic">
                            <option value="classic" data-i18n="border_style_classic">经典方框</option>
                            <option value="round" data-i18n="border_style_round">圆角边框</option>
                            <option value="diamond-cut" data-i18n="border_style_diamond_cut">钻石切割</option>
                        </optgroup>
                        <optgroup label="" data-i18n-label="optgroup_border_inward">
                            <option value="elegant" data-i18n="border_style_elegant" selected>优雅内凹</option>
                            <option value="inward-curve" data-i18n="border_style_inward_curve">四向内凹</option>
                            <option value="inward-double" data-i18n="border_style_inward_double">双重内凹</option>
                            <option value="inward-corner" data-i18n="border_style_inward_corner">角落内凹</option>
                            <option value="inward-arch" data-i18n="border_style_inward_arch">拱形内凹</option>
                            <option value="inward-lens" data-i18n="border_style_inward_lens">透镜内凹</option>
                        </optgroup>
                        <optgroup label="" data-i18n-label="optgroup_border_wave">
                            <option value="wave" data-i18n="border_style_wave">波浪边框</option>
                            <option value="scallop" data-i18n="border_style_scallop">扇贝边框</option>
                            <option value="zigzag" data-i18n="border_style_zigzag">锯齿边框</option>
                            <option value="cloud" data-i18n="border_style_cloud">云朵边框</option>
                        </optgroup>
                        <optgroup label="" data-i18n-label="optgroup_border_fancy">
                            <option value="baroque" data-i18n="border_style_baroque">巴洛克</option>
                            <option value="gothic" data-i18n="border_style_gothic">哥特式</option>
                            <option value="art-deco" data-i18n="border_style_art_deco">装饰艺术</option>
                        </optgroup>
                    </select>

                </div>
                <div class="control-row">
                    <label data-i18n="border_curve">内凹程度:</label>
                    <input type="range" id="borderCurve" min="0" max="80" value="15">
                    <span id="borderCurveValue">15</span>
                </div>
                <div class="control-row">
                    <label data-i18n="border_curve_ratio">内凹占比:</label>
                    <input type="range" id="borderCurveRatio" min="10" max="90" value="50">
                    <span id="borderCurveRatioValue">50%</span>
                </div>
                <div class="control-row">
                    <label data-i18n="border_corner_cut">切角大小:</label>
                    <input type="range" id="borderCornerCut" min="0" max="80" value="30">
                    <span id="borderCornerCutValue">30</span>
                </div>
            </div>

            <!-- 角落装饰 -->
            <div class="control-section">
                <h3 data-i18n="section_corner">♠️ 角落装饰</h3>
                <div class="control-row">
                    <label>
                        <input type="checkbox" id="enableCorners" checked>
                        <span data-i18n="enable_corners">启用角落装饰</span>
                    </label>
                </div>
                
                <!-- 四角独立样式 -->
                <div class="control-row">
                    <label>
                        <input type="checkbox" id="enableDifferentCorners">
                        <span data-i18n="enable_different_corners">四角不同样式</span>
                    </label>
                </div>
                
                <!-- 旋转模式 -->
                <div class="control-row">
                    <label>
                        <input type="checkbox" id="enableCornerRotation" checked>
                        <span data-i18n="enable_corner_rotation">四角随角度旋转</span>
                    </label>
                </div>
                
                <!-- 统一样式（默认显示） -->
                <div id="unifiedStyleGroup">
                    <div class="control-row">
                        <label data-i18n="corner_style">装饰样式:</label>
                        <select id="cornerStyle" class="corner-style-select">
                            <optgroup data-i18n-label="optgroup_poker" label="">
                                <option value="club" data-i18n="style_club">♣ 梅花</option>
                                <option value="spade" data-i18n="style_spade">♠ 黑桃</option>
                                <option value="heart" data-i18n="style_heart">♥ 红心</option>
                                <option value="diamond" data-i18n="style_diamond">♦ 方块</option>
                            </optgroup>
                            <optgroup data-i18n-label="optgroup_fancy" label="">
                                <option value="club-fancy" data-i18n="style_club_fancy">♣ 华丽梅花</option>
                                <option value="spade-fancy" data-i18n="style_spade_fancy">♠ 华丽黑桃</option>
                                <option value="heart-fancy" data-i18n="style_heart_fancy">♥ 华丽红心</option>
                                <option value="diamond-fancy" data-i18n="style_diamond_fancy">♦ 华丽方块</option>
                            </optgroup>
                            <optgroup data-i18n-label="optgroup_ornate" label="">
                                <option value="ornate" data-i18n="style_ornate">✤ 华丽装饰</option>
                                <option value="fleur" data-i18n="style_fleur">⚜ 鸢尾花</option>
                            </optgroup>
                            <optgroup data-i18n-label="optgroup_music" label="">
                                <option value="note1" data-i18n="style_note1">♪ 八分音符</option>
                                <option value="note2" data-i18n="style_note2">♫ 双八分音符</option>
                                <option value="note3" data-i18n="style_note3">𝄞 高音谱号</option>
                                <option value="note4" data-i18n="style_note4">♩ 四分音符</option>
                                <option value="note5" data-i18n="style_note5">𝅗𝅥 二分音符</option>
                                <option value="note6" data-i18n="style_note6">𝅝 全音符</option>
                                <option value="note7" data-i18n="style_note7">𝄢 低音谱号</option>
                                <option value="note8" data-i18n="style_note8">𝄽 八分休止</option>
                                <option value="note9" data-i18n="style_note9">♬ 三连音</option>
                            </optgroup>
                            <optgroup data-i18n-label="optgroup_nature" label="">
                                <option value="star" data-i18n="style_star">★ 星星</option>
                                <option value="star6" data-i18n="style_star6">✡ 六角星</option>
                                <option value="flower" data-i18n="style_flower">❀ 花朵</option>
                                <option value="sakura" data-i18n="style_sakura">🌸 樱花</option>
                                <option value="leaf" data-i18n="style_leaf">🍃 叶子</option>
                                <option value="moon" data-i18n="style_moon">☽ 月亮</option>
                            </optgroup>
                            <optgroup data-i18n-label="optgroup_geometric" label="">
                                <option value="crown" data-i18n="style_crown">👑 皇冠</option>
                                <option value="ribbon" data-i18n="style_ribbon">🎀 蝴蝶结</option>
                                <option value="crystal" data-i18n="style_crystal">💎 水晶</option>
                                <option value="swirl" data-i18n="style_swirl">🌀 漩涡</option>
                            </optgroup>
                        </select>

                    </div>
                </div>
                
                <!-- 四角独立样式（隐藏） -->
                <div id="differentStyleGroup" style="display: none;">
                    <div class="corner-style-grid">
                        <div class="corner-style-item">
                            <span data-i18n="corner_tl">↖ 左上:</span>
                            <select id="cornerStyleTL" class="corner-style-select">
                                <optgroup data-i18n-label="optgroup_poker" label="">

                                <optgroup data-i18n-label="optgroup_fancy" label="">

                                    <option value="spade-fancy" data-i18n="style_spade_fancy">♠ 华丽黑桃</option>
                                    <option value="heart-fancy" data-i18n="style_heart_fancy">♥ 华丽红心</option>
                                    <option value="diamond-fancy" data-i18n="style_diamond_fancy">♦ 华丽方块</option>
                                </optgroup>
                                <optgroup data-i18n-label="optgroup_ornate" label="">
                                    <option value="ornate" data-i18n="style_ornate">✤ 华丽装饰</option>
                                    <option value="fleur" data-i18n="style_fleur">⚜ 鸢尾花</option>
                                </optgroup>
                                <optgroup data-i18n-label="optgroup_music" label="">
                                    <option value="note1" data-i18n="style_note1">♪ 八分音符</option>
                                    <option value="note2" data-i18n="style_note2">♫ 双八分音符</option>
                                    <option value="note3" data-i18n="style_note3">𝄞 高音谱号</option>

                                    <option value="note5" data-i18n="style_note5">𝅗𝅥 二分音符</option>
                                    <option value="note6" data-i18n="style_note6">𝅝 全音符</option>
                                    <option value="note7" data-i18n="style_note7">𝄢 低音谱号</option>

                                    <option value="crystal" data-i18n="style_crystal">💎 水晶</option>
                                    <option value="swirl" data-i18n="style_swirl">🌀 漩涡</option>
                                </optgroup>
                            </select>

                        </div>
                        <div class="corner-style-item">
                            <span data-i18n="corner_tr">↗ 右上:</span>
                            <select id="cornerStyleTR" class="corner-style-select">
                                <optgroup data-i18n-label="optgroup_poker" label="">
                                    <option value="club" data-i18n="style_club">♣ 梅花</option>
                                    <option value="spade" selected data-i18n="style_spade">♠ 黑桃</option>
                                    <option value="heart" data-i18n="style_heart">♥ 红心</option>
                                    <option value="diamond" data-i18n="style_diamond">♦ 方块</option>
                                </optgroup>
                                <optgroup data-i18n-label="optgroup_fancy" label="">
                                    <option value="club-fancy" data-i18n="style_club_fancy">♣ 华丽梅花</option>
                                    <option value="spade-fancy" data-i18n="style_spade_fancy">♠ 华丽黑桃</option>
                                    <option value="heart-fancy" data-i18n="style_heart_fancy">♥ 华丽红心</option>
                                    <option value="diamond-fancy" data-i18n="style_diamond_fancy">♦ 华丽方块</option>
                                </optgroup>
                                <optgroup data-i18n-label="optgroup_ornate" label="">
                                    <option value="ornate" data-i18n="style_ornate">✤ 华丽装饰</option>

                                </optgroup>
                                <optgroup data-i18n-label="optgroup_music" label="">
                                    <option value="note1" data-i18n="style_note1">♪ 八分音符</option>
                                    <option value="note2" data-i18n="style_note2">♫ 双八分音符</option>
                                    <option value="note3" data-i18n="style_note3">𝄞 高音谱号</option>
                                    <option value="note4" data-i18n="style_note4">♩ 四分音符</option>
                                    <option value="note5" data-i18n="style_note5">𝅗𝅥 二分音符</option>
                                    <option value="note6" data-i18n="style_note6">𝅝 全音符</option>
                                    <option value="note7" data-i18n="style_note7">𝄢 低音谱号</option>

                                </optgroup>

                                    <option value="swirl" data-i18n="style_swirl">🌀 漩涡</option>
                                </optgroup>
                            </select>

                        </div>
                        <div class="corner-style-item">
                            <span data-i18n="corner_bl">↙ 左下:</span>
                            <select id="cornerStyleBL" class="corner-style-select">
                                <optgroup data-i18n-label="optgroup_poker" label="">
                                    <option value="club" data-i18n="style_club">♣ 梅花</option>
                                    <option value="spade" data-i18n="style_spade">♠ 黑桃</option>
                                    <option value="heart" selected data-i18n="style_heart">♥ 红心</option>
                                    <option value="diamond" data-i18n="style_diamond">♦ 方块</option>
                                </optgroup>
                                <optgroup data-i18n-label="optgroup_fancy" label="">

                                    <option value="spade-fancy" data-i18n="style_spade_fancy">♠ 华丽黑桃</option>

                                </optgroup>
                                <optgroup data-i18n-label="optgroup_ornate" label="">
                                    <option value="ornate" data-i18n="style_ornate">✤ 华丽装饰</option>
                                    <option value="fleur" data-i18n="style_fleur">⚜ 鸢尾花</option>
                                </optgroup>
                                <optgroup data-i18n-label="optgroup_music" label="">
                                    <option value="note1" data-i18n="style_note1">♪ 八分音符</option>

                                    <option value="note3" data-i18n="style_note3">𝄞 高音谱号</option>

                                    <option value="note7" data-i18n="style_note7">𝄢 低音谱号</option>
                                    <option value="note8" data-i18n="style_note8">𝄽 八分休止</option>
                                    <option value="note9" data-i18n="style_note9">♬ 三连音</option>
                                </optgroup>
                                <optgroup data-i18n-label="optgroup_nature" label="">
                                    <option value="star" data-i18n="style_star">★ 星星</option>
                                    <option value="star6" data-i18n="style_star6">✡ 六角星</option>
                                    <option value="flower" data-i18n="style_flower">❀ 花朵</option>
                                    <option value="sakura" data-i18n="style_sakura">🌸 樱花</option>
                                    <option value="leaf" data-i18n="style_leaf">🍃 叶子</option>
                                    <option value="moon" data-i18n="style_moon">☽ 月亮</option>
                                </optgroup>
                                <optgroup data-i18n-label="optgroup_geometric" label="">
                                    <option value="crown" data-i18n="style_crown">👑 皇冠</option>
                                    <option value="ribbon" data-i18n="style_ribbon">🎀 蝴蝶结</option>
                                    <option value="crystal" data-i18n="style_crystal">💎 水晶</option>
                                    <option value="swirl" data-i18n="style_swirl">🌀 漩涡</option>
                                </optgroup>
                            </select>

                        </div>
                        <div class="corner-style-item">
                            <span data-i18n="corner_br">↘ 右下:</span>
                            <select id="cornerStyleBR" class="corner-style-select">
                                <optgroup data-i18n-label="optgroup_poker" label="">
                                    <option value="club" data-i18n="style_club">♣ 梅花</option>
                                    <option value="spade" data-i18n="style_spade">♠ 黑桃</option>
                                    <option value="heart" data-i18n="style_heart">♥ 红心</option>
                                    <option value="diamond" selected data-i18n="style_diamond">♦ 方块</option>
                                </optgroup>
                                <optgroup data-i18n-label="optgroup_fancy" label="">
                                    <option value="club-fancy" data-i18n="style_club_fancy">♣ 华丽梅花</option>
                                    <option value="spade-fancy" data-i18n="style_spade_fancy">♠ 华丽黑桃</option>
                                    <option value="heart-fancy" data-i18n="style_heart_fancy">♥ 华丽红心</option>
                                    <option value="diamond-fancy" data-i18n="style_diamond_fancy">♦ 华丽方块</option>
                                </optgroup>
                                <optgroup data-i18n-label="optgroup_ornate" label="">
                                    <option value="ornate" data-i18n="style_ornate">✤ 华丽装饰</option>
                                    <option value="fleur" data-i18n="style_fleur">⚜ 鸢尾花</option>
                                </optgroup>
                                <optgroup data-i18n-label="optgroup_music" label="">
                                    <option value="note1" data-i18n="style_note1">♪ 八分音符</option>
                                    <option value="note2" data-i18n="style_note2">♫ 双八分音符</option>
                                    <option value="note3" data-i18n="style_note3">𝄞 高音谱号</option>
                                    <option value="note4" data-i18n="style_note4">♩ 四分音符</option>
                                    <option value="note5" data-i18n="style_note5">𝅗𝅥 二分音符</option>
                                    <option value="note6" data-i18n="style_note6">𝅝 全音符</option>
                                    <option value="note7" data-i18n="style_note7">𝄢 低音谱号</option>
                                    <option value="note8" data-i18n="style_note8">𝄽 八分休止</option>
                                    <option value="note9" data-i18n="style_note9">♬ 三连音</option>
                                </optgroup>
                                <optgroup data-i18n-label="optgroup_nature" label="">
                                    <option value="star" data-i18n="style_star">★ 星星</option>
                                    <option value="star6" data-i18n="style_star6">✡ 六角星</option>
                                    <option value="flower" data-i18n="style_flower">❀ 花朵</option>
                                    <option value="sakura" data-i18n="style_sakura">🌸 樱花</option>
                                    <option value="leaf" data-i18n="style_leaf">🍃 叶子</option>
                                    <option value="moon" data-i18n="style_moon">☽ 月亮</option>
                                </optgroup>
                                <optgroup data-i18n-label="optgroup_geometric" label="">
                                    <option value="crown" data-i18n="style_crown">👑 皇冠</option>
                                    <option value="ribbon" data-i18n="style_ribbon">🎀 蝴蝶结</option>
                                    <option value="crystal" data-i18n="style_crystal">💎 水晶</option>
                                    <option value="swirl" data-i18n="style_swirl">🌀 漩涡</option>
                                </optgroup>
                            </select>

                        </div>
                    </div>
                </div>
                
                <div class="control-row">
                    <label data-i18n="corner_size">装饰大小:</label>
                    <input type="range" id="cornerSize" min="30" max="150" value="80">
                    <span id="cornerSizeValue">80</span>
                </div>
                <div class="control-row">
                    <label data-i18n="corner_color">装饰颜色:</label>
                    <input type="color" id="cornerColor" value="#ffffff">
                </div>
                <div class="control-row">
                    <label data-i18n="corner_render_mode">符号绘制:</label>
                    <select id="cornerRenderMode">
                        <option value="fill" data-i18n="corner_render_fill" selected>填充</option>
                        <option value="stroke" data-i18n="corner_render_stroke">细线</option>
                    </select>
                </div>
                
                <!-- 菱形边框 -->



                <div class="control-row">
                    <label>
                        <input type="checkbox" id="enableCornerFrame" checked>
                        <span data-i18n="enable_corner_frame">菱形边框</span>
                    </label>
                </div>
                <div class="control-row">
                    <label data-i18n="corner_frame_size">边框大小:</label>
                    <input type="range" id="cornerFrameSize" min="100" max="300" value="150">
                    <span id="cornerFrameSizeValue">150%</span>
                </div>
                <div class="control-row">
                    <label data-i18n="corner_frame_width">边框粗细:</label>
                    <input type="range" id="cornerFrameWidth" min="1" max="8" value="3">
                    <span id="cornerFrameWidthValue">3</span>
                </div>
                <div class="control-row">
                    <label data-i18n="corner_frame_color">边框颜色:</label>
                    <input type="color" id="cornerFrameColor" value="#f2d38f">
                </div>
                <div class="control-row">
                    <label data-i18n="corner_frame_fill">填充颜色:</label>
                    <input type="color" id="cornerFrameFill" value="#0a0612">
                </div>
                
                <div class="control-row">
                    <label>
                        <input type="checkbox" id="enableCornerStroke" checked>
                        <span data-i18n="enable_corner_stroke">描边效果</span>
                    </label>
                </div>
                <div class="control-row">
                    <label data-i18n="corner_stroke_color">描边颜色:</label>
                    <input type="color" id="cornerStrokeColor" value="#8a5a00">
                </div>
                <div class="control-row">
                    <label data-i18n="corner_stroke_width">描边粗细:</label>
                    <input type="range" id="cornerStrokeWidth" min="1" max="8" value="3">
                    <span id="cornerStrokeWidthValue">3</span>
                </div>
                <div class="control-row">
                    <label>
                        <input type="checkbox" id="enableCornerGlow" checked>
                        <span data-i18n="enable_corner_glow">光泽效果</span>
                    </label>
                </div>
                <div class="control-row">
                    <label data-i18n="corner_glow_color">光泽颜色:</label>
                    <input type="color" id="cornerGlowColor" value="#fff0c6">
                </div>
                <div class="control-row">
                    <label data-i18n="corner_glow_intensity">光泽强度:</label>
                    <input type="range" id="cornerGlowIntensity" min="0" max="100" value="50">
                    <span id="cornerGlowIntensityValue">50%</span>
                </div>
                <div class="control-row">
                    <label>
                        <input type="checkbox" id="enableCornerShadow">
                        <span data-i18n="enable_corner_shadow">阴影效果</span>
                    </label>
                </div>
                <div class="control-row">
                    <label>
                        <input type="checkbox" id="enableDots" checked>
                        <span data-i18n="enable_dots">启用圆点装饰</span>
                    </label>
                </div>
            </div>

            <!-- 角色剪影 -->
            <div class="control-section">
                <h3 data-i18n="section_character">👤 角色剪影</h3>
                <div class="control-row">
                    <label>
                        <input type="checkbox" id="enableCharacter">
                        <span data-i18n="enable_character">启用角色剪影</span>
                    </label>
                </div>
                <div class="control-row">
                    <label data-i18n="character_upload">上传图片:</label>
                    <input type="file" id="characterImage" accept="image/*">
                </div>
                <div class="control-row">
                    <label data-i18n="character_opacity">透明度:</label>
                    <input type="range" id="characterOpacity" min="10" max="100" value="30">
                    <span id="characterOpacityValue">30%</span>
                </div>
                <div class="control-row">
                    <label data-i18n="character_position">位置:</label>
                    <select id="characterPosition">
                        <option value="left" data-i18n="position_left">左侧</option>
                        <option value="right" data-i18n="position_right">右侧</option>
                        <option value="center" data-i18n="position_center">居中</option>
                    </select>
                </div>
            </div>

            <!-- 渐变叠加 -->
            <div class="control-section">
                <h3 data-i18n="section_gradient">🌈 渐变叠加</h3>
                <div class="control-row">
                    <label>
                        <input type="checkbox" id="enableGradient" checked>
                        <span data-i18n="enable_gradient">启用渐变</span>
                    </label>
                </div>
                <div class="control-row">
                    <label data-i18n="gradient_direction">渐变方向:</label>
                    <select id="gradientDirection">
                        <option value="diagonal" data-i18n="direction_diagonal">对角线</option>
                        <option value="horizontal" data-i18n="direction_horizontal">水平</option>
                        <option value="vertical" data-i18n="direction_vertical">垂直</option>
                        <option value="radial" data-i18n="direction_radial">径向</option>
                    </select>
                </div>
                <div class="control-row">
                    <label data-i18n="gradient_start">起始色:</label>
                    <input type="color" id="gradientStart" value="#ffffff">
                </div>
                <div class="control-row">
                    <label data-i18n="gradient_end">结束色:</label>
                    <input type="color" id="gradientEnd" value="#1a0b2e">
                </div>
                <div class="control-row">
                    <label data-i18n="gradient_intensity">强度:</label>
                    <input type="range" id="gradientIntensity" min="0" max="50" value="20">
                    <span id="gradientIntensityValue">20%</span>
                </div>
            </div>

            <!-- 导出按钮 -->
            <div class="export-section">
                <button id="refreshBtn" class="btn-primary" data-i18n="btn_refresh">🔄 刷新预览</button>
                <button id="exportPng" class="btn-success" data-i18n="btn_export_png">📥 导出 PNG</button>
                <button id="exportJpg" class="btn-success" data-i18n="btn_export_jpg">📥 导出 JPG</button>
            </div>
        </div>

        <!-- 右侧预览区域 -->
        <div class="preview-area">
            <div class="preview-header">
                <span data-i18n="preview_label">预览</span>
                <span id="previewSize">1920 × 1080</span>
            </div>
            <div class="preview-container">
                <canvas id="previewCanvas"></canvas>
            </div>
        </div>
    </div>

    <script src="../i18n-helper.js"></script>
    <script src="app.js"></script>
</body>
</html>
